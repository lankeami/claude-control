<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Controller</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="/app.js"></script>
  <script defer src="/alpine.min.js"></script>
</head>
<body x-data="app">

  <!-- Connection banner -->
  <div class="connection-banner" x-show="authenticated && !connected" x-cloak>
    Reconnecting...
  </div>

  <!-- Login screen -->
  <template x-if="!authenticated">
    <div class="login-container">
      <div class="login-card">
        <h1>Claude Controller</h1>
        <p class="subtitle" x-text="`Connect to ${window.location.origin}`"></p>

        <form @submit.prevent="login">
          <div class="form-group">
            <label for="apiKey">API Key</label>
            <div class="input-wrapper">
              <input id="apiKey" type="password" x-model="loginKey"
                     placeholder="sk-..." autocomplete="off">
            </div>
          </div>
          <button type="submit" class="btn btn-primary" :disabled="loginLoading || !loginKey">
            <span x-show="!loginLoading">Connect</span>
            <span x-show="loginLoading">Connecting...</span>
          </button>
          <p class="error-msg" x-show="loginError" x-text="loginError"></p>
        </form>
      </div>
    </div>
  </template>

  <!-- Dashboard -->
  <template x-if="authenticated">
    <div class="dashboard">
      <!-- Sidebar (desktop) -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span style="font-size:0.875rem;font-weight:600;">Sessions</span>
          <button class="btn btn-sm" @click="disconnect" style="background:transparent;color:var(--text-muted)">
            Disconnect
          </button>
        </div>
        <div class="session-list">
          <button class="btn btn-sm btn-primary" @click="openNewSessionModal()"
                  style="width:100%; margin-bottom:8px; font-size:13px;">
            + New Session
          </button>
          <template x-for="session in sessions" :key="session.id">
            <div class="session-item" :class="{ active: selectedSessionId === session.id }"
                 @click="selectSession(session.id)">
              <span class="status-dot" :class="sessionStatus(session)"></span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                    x-text="sessionName(session)"></span>
              <span x-show="session.mode === 'managed'"
                    style="font-size:10px; background:var(--accent); color:white; padding:1px 4px; border-radius:3px; margin-left:4px; flex-shrink:0;">managed</span>
              <span class="badge" x-show="pendingCountFor(session.id) > 0"
                    x-text="pendingCountFor(session.id)"></span>
              <button class="session-delete" @click.stop="deleteSession(session.id)"
                      title="Remove session">&times;</button>
            </div>
          </template>
        </div>
      </div>

      <!-- Main area -->
      <div class="main">
        <div class="main-header">
          <h2 x-text="selectedSessionId
            ? sessionName(sessions.find(s => s.id === selectedSessionId) || {computer_name:'',project_path:''})
            : 'Select a Session'"></h2>
          <button class="btn btn-sm" x-show="currentSession?.mode === 'managed' && currentSession?.status === 'running'"
                  @click="interruptSession()"
                  style="background:#e74c3c; color:white; margin-left:8px;">
            Stop
          </button>
        </div>

        <!-- Mobile session selector -->
        <div class="mobile-session-select">
          <select x-model="selectedSessionId"
                  @change="selectedSessionId = $event.target.value || null">
            <template x-for="session in sessions" :key="session.id">
              <option :value="session.id" x-text="sessionName(session)"></option>
            </template>
          </select>
        </div>

        <div class="main-content-split">
          <div class="chat-column" :class="{ 'has-viewer': viewerFile || selectedIssue }">
            <!-- Chat area -->
            <div class="chat-area" id="chat-area">
              <template x-if="!selectedSessionId">
                <div class="chat-empty">
                  <div>
                    <p style="font-size:1.125rem">Select a session</p>
                    <p style="font-size:0.875rem;margin-top:0.5rem">Choose a session from the sidebar to view the conversation</p>
                  </div>
                </div>
              </template>
              <template x-if="selectedSessionId && chatMessages.length === 0 && !chatLoading">
                <div class="chat-empty">
                  <div>
                    <p style="font-size:1.125rem">No messages yet</p>
                    <p style="font-size:0.875rem;margin-top:0.5rem">Conversation will appear here</p>
                  </div>
                </div>
              </template>
              <template x-for="(msg, idx) in chatMessages" :key="idx">
                <div class="chat-item">
                  <template x-if="msg.role === 'activity'">
                    <div class="activity-pills">
                      <span class="activity-pill" :class="msg.pillState">
                        <span class="pill-icon" :class="{ pulse: msg.pillState === 'active' }"
                              x-text="msg.pillState === 'active' ? '●' : msg.pillState === 'completed' ? '✓' : msg.pillState === 'stale' ? '⚠' : '✕'"></span>
                        <span x-text="msg.content"></span>
                        <span class="pill-duration" x-show="msg.duration" x-text="msg.duration"></span>
                      </span>
                    </div>
                  </template>
                  <template x-if="msg.role !== 'activity'">
                    <div class="chat-bubble"
                         :class="bubbleClass(msg, idx)"
                         x-html="bubbleHTML(msg)">
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <!-- Response textarea (only when pending prompt) -->
            <div class="response-area" x-show="currentPendingPrompt">
              <textarea x-model="responseText" :placeholder="isPromptStale ? 'Hook timed out — will queue as instruction...' : 'Type your response...'"
                        @keydown.enter.prevent="if(!$event.shiftKey && responseText.trim()){
                          responseSending=true;
                          respondToPrompt(currentPendingPrompt.id, responseText).then(() => responseSending=false);
                        }"
                        :disabled="responseSending"></textarea>
              <button class="send-btn" :disabled="!responseText.trim() || responseSending"
                      @click="responseSending=true;respondToPrompt(currentPendingPrompt.id, responseText).then(() => responseSending=false)">
                &#9654;
              </button>
            </div>

            <!-- Input bar (managed mode messages OR hook-mode instructions) -->
            <div class="instruction-bar" x-show="selectedSessionId && !currentPendingPrompt">
              <textarea x-model="inputText" rows="1"
                     :placeholder="currentSession?.mode === 'managed' ? 'Send a message... (type /resume to continue a previous session)' : 'Send instruction (delivered on next stop)...'"
                     @keydown="if(($event.metaKey || $event.ctrlKey) && $event.key === 'Enter') { $event.preventDefault(); handleInput(); }"
                     @input="$el.style.height = 'auto'; $el.style.height = Math.min($el.scrollHeight, 150) + 'px'"
                     :disabled="inputSending"></textarea>
              <button class="btn btn-primary btn-sm" :disabled="!inputText.trim() || inputSending"
                      @click="handleInput()" style="width:auto">
                <span x-show="!inputSuccess">Send</span>
                <span x-show="inputSuccess" style="color:#16a34a">Sent!</span>
              </button>
              <span class="input-hint">⌘↵ to send</span>
            </div>
          </div>

          <!-- File Viewer Panel -->
          <div class="file-viewer-column" x-show="viewerFile || selectedIssue" x-cloak>
            <!-- File viewer (existing) -->
            <template x-if="viewerFile && !selectedIssue">
              <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
                <div class="file-viewer-header">
                  <span class="file-viewer-path" x-text="viewerFileName"></span>
                  <span class="file-type-badge" x-text="viewerFileType" x-show="viewerFileType"></span>
                  <div class="file-viewer-controls">
                    <button :class="{ active: viewerMode === 'diff' }" @click="switchToDiffView()">Diff</button>
                    <button :class="{ active: viewerMode === 'full' }" @click="switchToFullView()">Full</button>
                    <button class="file-viewer-close" @click="closeFileViewer()">&times;</button>
                  </div>
                </div>
                <div class="file-viewer-body">
                  <div x-show="viewerMode === 'diff'" class="diff-view">
                    <div x-show="viewerLoading" class="viewer-loading">Loading diff...</div>
                    <div x-show="!viewerLoading && !viewerDiffHtml" class="diff-empty">No changes detected for this file.</div>
                    <div x-show="!viewerLoading && viewerDiffHtml" x-html="viewerDiffHtml"></div>
                  </div>
                  <div x-show="viewerMode === 'full'" class="full-view">
                    <div x-show="viewerLoading" class="viewer-loading">Loading...</div>
                    <div x-show="viewerBinary" class="viewer-binary">Binary file — cannot display.</div>
                    <div x-show="!viewerLoading && !viewerBinary" class="full-file-content" x-html="viewerFullHtml"></div>
                    <div x-show="viewerTruncated" class="viewer-truncated">File truncated (exceeds 1MB).</div>
                  </div>
                </div>
              </div>
            </template>
            <!-- Issue viewer -->
            <template x-if="selectedIssue">
              <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
                <div class="file-viewer-header">
                  <span class="file-viewer-path" x-text="'Issue #' + selectedIssue.number"></span>
                  <span class="file-type-badge" x-text="selectedIssue.state" :style="selectedIssue.state === 'OPEN' ? 'background:#238636;color:#fff' : 'background:#8957e5;color:#fff'"></span>
                  <div class="file-viewer-controls">
                    <a class="issue-link-btn" :href="'https://github.com/' + githubRepo + '/issues/' + selectedIssue.number" target="_blank" rel="noopener"
                       title="Open on GitHub">↗ GitHub</a>
                    <button class="generate-prompt-btn" style="padding:2px 10px;font-size:11px;width:auto;border-radius:4px" @click="generateIssuePrompt(selectedIssue)">Generate Prompt</button>
                    <button class="file-viewer-close" @click="closeIssueViewer()">&times;</button>
                  </div>
                </div>
                <div class="file-viewer-body" style="padding:16px">
                  <div x-show="selectedIssueLoading" class="viewer-loading">Loading issue...</div>
                  <div x-show="!selectedIssueLoading">
                    <h3 style="margin:0 0 8px 0;font-size:16px;color:var(--text)" x-text="selectedIssue.title"></h3>
                    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">
                      opened by <span x-text="selectedIssue.author"></span> ·
                      <span x-text="issueTimeAgo(selectedIssue.created_at || selectedIssue.updated_at)"></span>
                    </div>
                    <div class="issue-labels" x-show="selectedIssue.labels && selectedIssue.labels.length > 0" style="margin-bottom:12px">
                      <template x-for="label in (selectedIssue.labels || [])" :key="label.name">
                        <span class="issue-label" :style="issueLabelStyle(label)" x-text="label.name"></span>
                      </template>
                    </div>
                    <div class="issue-body" style="max-height:none;background:transparent;border:none;padding:0"
                         x-html="typeof marked !== 'undefined' ? marked.parse(selectedIssue.body || '*No description*') : (selectedIssue.body || '(No description)')"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- File Tree Sidebar -->
      <div class="file-tree-sidebar" x-show="authenticated && selectedSessionId">
        <div class="file-tree-header">
          <span>Files</span>
          <span class="file-count-badge" x-show="sessionFiles.length > 0" x-text="sessionFiles.length"></span>
          <button class="file-tree-refresh" @click="loadSessionFiles(selectedSessionId)" title="Refresh files">↻</button>
        </div>
        <div class="file-tree-list">
          <template x-if="visibleFileNodes.length === 0">
            <div class="file-tree-empty">No files found</div>
          </template>
          <template x-for="node in visibleFileNodes" :key="node.path + (node.action || '')">
            <div class="file-tree-item"
                 :class="{ 'is-dir': node.isDir, 'is-selected': viewerFile === node.path, 'has-changes': !node.isDir && (node.gitStatus || node.action) }"
                 :style="'padding-left: ' + (node.depth * 16 + 8) + 'px'"
                 @click="node.isDir ? toggleDir(node) : openFileViewer(node.path)">
              <span class="file-tree-icon" x-text="node.isDir ? (node.open ? '▾' : '▸') : ''"></span>
              <span class="file-tree-name" :class="{ 'name-modified': !node.isDir && node.gitStatus }" x-text="node.name" :title="node.path"></span>
              <span class="file-tree-status" :class="'git-' + (node.gitStatus === '?' ? 'untracked' : (node.gitStatus || ''))"
                    x-show="!node.isDir && node.gitStatus"
                    x-text="node.gitStatus"></span>
              <span class="file-tree-action" :class="'action-' + (node.action || '')"
                    :style="!node.gitStatus ? 'margin-left:auto' : ''"
                    x-show="!node.isDir && node.action"
                    x-text="node.action === 'edit' ? 'E' : node.action === 'write' ? 'W' : 'R'"></span>
            </div>
          </template>
        </div>
        <div class="git-status-bar" x-show="gitInfo">
          <div class="git-repo-row" x-show="gitInfo?.repo_name" style="display:flex; align-items:center; gap:4px; margin-bottom:2px; font-size:11px; opacity:0.7;">
            <a :href="gitInfo?.repo_url" target="_blank" rel="noopener" x-text="gitInfo?.repo_name"
               style="color:var(--text-secondary); text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
               @mouseenter="$el.style.color='var(--accent-color)'; $el.style.textDecoration='underline'"
               @mouseleave="$el.style.color='var(--text-secondary)'; $el.style.textDecoration='none'"></a>
          </div>
          <div class="git-branch-row">
            <span class="git-branch-icon">⎇</span>
            <span class="git-branch-name" x-text="gitInfo?.branch || 'detached'"></span>
            <span class="git-ahead" x-show="gitInfo?.ahead > 0" x-text="'↑' + gitInfo?.ahead" title="Commits ahead of remote"></span>
            <span class="git-behind" x-show="gitInfo?.behind > 0" x-text="'↓' + gitInfo?.behind" title="Commits behind remote"></span>
          </div>
          <div class="git-file-counts" x-show="gitInfo?.modified || gitInfo?.added || gitInfo?.deleted || gitInfo?.untracked || gitInfo?.staged">
            <span class="git-stat git-stat-staged" x-show="gitInfo?.staged > 0" x-text="gitInfo?.staged + ' staged'" title="Staged changes"></span>
            <span class="git-stat git-stat-modified" x-show="gitInfo?.modified > 0" x-text="gitInfo?.modified + ' modified'" title="Modified files"></span>
            <span class="git-stat git-stat-added" x-show="gitInfo?.added > 0" x-text="gitInfo?.added + ' added'" title="Added files"></span>
            <span class="git-stat git-stat-deleted" x-show="gitInfo?.deleted > 0" x-text="gitInfo?.deleted + ' deleted'" title="Deleted files"></span>
            <span class="git-stat git-stat-untracked" x-show="gitInfo?.untracked > 0" x-text="gitInfo?.untracked + ' untracked'" title="Untracked files"></span>
          </div>
          <div class="git-clean" x-show="!gitInfo?.modified && !gitInfo?.added && !gitInfo?.deleted && !gitInfo?.untracked && !gitInfo?.staged">
            <span class="git-clean-text">Working tree clean</span>
          </div>
        </div>

        <!-- GitHub Issues Section -->
        <div class="issues-section" x-show="gitInfo && sessions.find(s => s.id === selectedSessionId)?.mode === 'managed'">
          <div class="issues-header" @click="issuesExpanded = !issuesExpanded" style="cursor:pointer">
            <span class="issues-title">
              <span class="issues-toggle" x-text="issuesExpanded ? '▼' : '▶'"></span>
              Issues
            </span>
            <div class="issue-state-toggles" x-show="issuesExpanded" @click.stop>
              <button class="issue-state-toggle"
                      :class="{ 'active-open': githubIssuesState === 'open' }"
                      @click="toggleIssueState('open')">Open</button>
              <button class="issue-state-toggle"
                      :class="{ 'active-closed': githubIssuesState === 'closed' }"
                      @click="toggleIssueState('closed')">Closed</button>
            </div>
          </div>
          <div x-show="issuesExpanded" x-collapse>
            <input type="text" class="issues-search" placeholder="Search issues..."
                   x-model="githubIssuesSearch"
                   @input="searchIssues()">
            <div x-show="githubIssuesLoading" class="issues-loading">Loading...</div>
            <div x-show="!githubIssuesLoading && githubIssuesError" class="issues-error" x-text="githubIssuesError"></div>
            <div x-show="!githubIssuesLoading && !githubIssuesError && githubIssues.length === 0" class="issues-empty">No issues found</div>
            <div class="issue-list" x-show="!githubIssuesLoading && !githubIssuesError && githubIssues.length > 0">
              <template x-for="issue in githubIssues" :key="issue.number">
                <div class="issue-row" :class="{ 'is-selected': selectedIssue?.number === issue.number }"
                     @click="fetchIssueDetail(selectedSessionId, issue.number)">
                  <div class="issue-dot" :class="issue.state"></div>
                  <div class="issue-row-content">
                    <div class="issue-row-title" x-text="issue.title"></div>
                    <div class="issue-row-meta" x-text="'#' + issue.number + ' · ' + issueTimeAgo(issue.updated_at)"></div>
                  </div>
                </div>
              </template>
            </div>
            <button x-show="githubIssuesHasMore && !githubIssuesLoading"
                    class="issues-show-more"
                    @click="loadMoreIssues()">Show more</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- New Session Modal -->
  <div x-show="showNewSessionModal" x-cloak
       style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center;"
       @click.self="showNewSessionModal = false">
    <div style="background:var(--bg); border-radius:12px; padding:24px; width:500px; max-width:90vw; border:1px solid var(--border); display:flex; flex-direction:column; max-height:70vh;">
      <h3 style="margin-top:0; margin-bottom:12px;">New Managed Session</h3>

      <!-- Path input with search -->
      <div style="display:flex; gap:8px; margin-bottom:4px;">
        <input x-model="newSessionCWD" type="text" placeholder="/path/to/project"
               style="flex:1; padding:8px; background:var(--input-bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; box-sizing:border-box;"
               @keydown="handleBrowseInputKeydown($event)"
               @input="if (newSessionCWD === browsePath) { browseFilter = ''; } else if (browsePath && newSessionCWD.startsWith(browsePath + '/')) { browseFilter = newSessionCWD.slice(browsePath.length + 1); }">
        <button class="btn btn-sm" @click="browseTo(newSessionCWD)" style="white-space:nowrap;">Go</button>
      </div>
      <div x-show="browseConfirmed" style="font-size:11px; color:var(--accent); margin-bottom:8px;">
        Press Enter again to start session in this folder
      </div>
      <div x-show="!browseConfirmed && browseFilter" style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">
        Filtering: <span x-text="browseFilter"></span>
      </div>

      <!-- Breadcrumb navigation -->
      <div class="browse-breadcrumbs">
        <template x-for="(crumb, i) in breadcrumbs" :key="crumb.path">
          <span>
            <span x-show="i > 0" style="color:var(--text-muted); margin:0 2px;">/</span>
            <a href="#" @click.prevent="browseTo(crumb.path)" x-text="crumb.label"
               style="color:var(--accent); text-decoration:none; font-size:13px;"></a>
          </span>
        </template>
      </div>

      <!-- Directory list -->
      <div class="browse-list">
        <template x-if="browseLoading">
          <div style="padding:1rem; text-align:center; color:var(--text-muted); font-size:13px;">Loading...</div>
        </template>
        <template x-if="!browseLoading && filteredBrowseEntries.length === 0">
          <div style="padding:1rem; text-align:center; color:var(--text-muted); font-size:13px;" x-text="browseFilter ? 'No matching directories' : 'No subdirectories'"></div>
        </template>
        <template x-for="entry in filteredBrowseEntries" :key="entry.path">
          <div class="browse-item" @click="browseFilter = ''; browseTo(entry.path)">
            <span class="browse-icon" x-text="entry.is_git_repo ? '&#9679;' : '&#128193;'"
                  :style="entry.is_git_repo ? 'color:var(--green)' : 'color:var(--text-muted)'"></span>
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="entry.name"></span>
            <span x-show="entry.is_git_repo" style="font-size:10px; color:var(--green); flex-shrink:0;">git</span>
          </div>
        </template>
      </div>

      <!-- New Project -->
      <div style="border-top:1px solid var(--border); padding-top:10px; margin-top:8px;">
        <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">Create new project in this folder:</div>
        <div style="display:flex; gap:8px;">
          <input x-model="newProjectName" type="text" placeholder="New project name..."
                 style="flex:1; padding:8px; background:var(--input-bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; box-sizing:border-box;"
                 @keydown.enter.prevent="createNewProject()">
          <button class="btn btn-sm btn-primary" @click="createNewProject()"
                  :disabled="!isValidNewProjectName || newProjectCreating"
                  x-text="newProjectCreating ? 'Creating...' : 'Create'"></button>
        </div>
        <div x-show="newProjectName && !isValidNewProjectName" style="font-size:11px; color:var(--red); margin-top:4px;">
          Use letters, numbers, hyphens, dots, or underscores. Must start/end with alphanumeric.
        </div>
        <div x-show="newProjectError" style="font-size:11px; color:var(--red); margin-top:4px;" x-text="newProjectError"></div>
      </div>

      <!-- Actions -->
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px; flex-shrink:0;">
        <button class="btn btn-sm" @click="showNewSessionModal = false">Cancel</button>
        <button class="btn btn-sm btn-primary" @click="createManagedSession()" :disabled="!newSessionCWD.trim()">
          Select This Folder
        </button>
      </div>
    </div>
  </div>

  <!-- Resume Picker Modal -->
  <div x-show="showResumePicker" x-cloak
       style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center;"
       @click.self="showResumePicker = false">
    <div style="background:var(--bg); border-radius:12px; padding:24px; width:500px; max-width:90vw; border:1px solid var(--border); display:flex; flex-direction:column; max-height:70vh;">
      <h3 style="margin-top:0; margin-bottom:12px;">Resume a Session</h3>

      <template x-if="resumeLoading">
        <div style="padding:2rem; text-align:center; color:var(--text-muted); font-size:13px;">Loading sessions...</div>
      </template>

      <template x-if="!resumeLoading && resumableSessions.length === 0">
        <div style="padding:2rem; text-align:center; color:var(--text-muted); font-size:13px;">No sessions to resume</div>
      </template>

      <div style="overflow-y:auto; flex:1; min-height:0;">
        <template x-for="rs in resumableSessions" :key="rs.session_id">
          <div @click="resumeSession(rs.session_id, rs.summary)"
               style="padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s;"
               onmouseenter="this.style.background='var(--hover)'"
               onmouseleave="this.style.background='transparent'">
            <div style="font-weight:600; font-size:14px; margin-bottom:2px;" x-text="rs.summary || 'Untitled session'"></div>
            <div style="font-size:12px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="rs.first_prompt"></div>
            <div style="display:flex; gap:8px; margin-top:4px; font-size:11px; color:var(--text-muted);">
              <span x-show="rs.git_branch" x-text="rs.git_branch" style="background:var(--input-bg); padding:1px 5px; border-radius:3px;"></span>
              <span x-text="rs.message_count + ' messages'"></span>
              <span x-text="timeAgo(rs.modified)"></span>
            </div>
          </div>
        </template>
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px; flex-shrink:0;">
        <button class="btn btn-sm" @click="showResumePicker = false">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" :class="{ visible: showToast, warning: toastType === 'warning', error: toastType === 'error' }" x-text="toastMessage"></div>

  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
